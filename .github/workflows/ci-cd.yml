name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - copilot/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/app-gestion-reclamations

jobs:
  ci:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP syntax check
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          IMAGE_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE_LOWER}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_LOWER}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: check-secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          missing=false
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY GHCR_PULL_USER GHCR_PULL_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "Missing secret: ${key}"
              missing=true
            fi
          done
          if [ "${missing}" = "true" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on remote host
        if: steps.check-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_NAME="ghcr.io/${IMAGE_OWNER}/app-gestion-reclamations:latest"
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER }}" --password-stdin
            docker pull "${IMAGE_NAME}"
            docker rm -f reclamations_app || true
            cat > .reclamations.env <<EOF
            DB_HOST=${{ secrets.PROD_DB_HOST }}
            DB_NAME=${{ secrets.PROD_DB_NAME }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASS=${{ secrets.PROD_DB_PASS }}
            EOF
            docker run -d --name reclamations_app --restart unless-stopped \
              -p 80:80 \
              --env-file .reclamations.env \
              "${IMAGE_NAME}"
            rm -f .reclamations.env

      - name: Skip deploy (missing secrets)
        if: steps.check-secrets.outputs.ready != 'true'
        run: echo "Deployment skipped because required secrets are not configured."
