services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reclamations_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-gestion_reclamations}
      DB_USER: ${DB_USER:-app_user}
      DB_PASS: ${DB_PASS:-app_password}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: reclamations_db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-gestion_reclamations}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASS:-app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./assets/code/db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "export MYSQL_PWD='${MYSQL_ROOT_PASSWORD:-root_password}'; mysqladmin ping -h localhost -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
